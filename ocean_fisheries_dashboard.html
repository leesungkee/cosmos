<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>해양 수산 KPI 대시보드</title>
  <style>
    :root {
      --bg: #f4f7f9;
      --panel: #ffffff;
      --ink: #1f2933;
      --muted: #667085;
      --line: #d8e1e8;
      --blue: #2276b7;
      --teal: #128c7e;
      --amber: #c77800;
      --red: #c64040;
      --green: #2f8f4e;
      --shadow: 0 12px 30px rgba(31, 41, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", "Malgun Gothic", Arial, sans-serif;
      letter-spacing: 0;
    }

    .dashboard {
      width: min(1280px, calc(100% - 36px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 26px 0;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 760;
    }

    .meta {
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 6px 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .kpi {
      min-height: 118px;
      padding: 17px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    .kpi-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .kpi-value {
      margin-top: 12px;
      font-size: clamp(25px, 2.6vw, 36px);
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
    }

    .kpi-unit {
      color: var(--muted);
      font-size: 13px;
      margin-left: 4px;
      font-weight: 650;
    }

    .kpi-note {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.05fr 1.45fr;
      gap: 12px;
    }

    .panel {
      padding: 18px;
      min-height: 286px;
      overflow: hidden;
    }

    .panel-wide {
      grid-column: span 2;
      min-height: 312px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    h2 {
      margin: 0;
      font-size: 17px;
      line-height: 1.25;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .bars {
      display: grid;
      gap: 12px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 96px minmax(120px, 1fr) 94px;
      align-items: center;
      gap: 12px;
      min-height: 31px;
      font-size: 13px;
    }

    .bar-label {
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .track {
      height: 13px;
      background: #e8eef2;
      border-radius: 999px;
      overflow: hidden;
      position: relative;
    }

    .fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: var(--blue);
      transition: width 700ms ease;
    }

    .bar-value {
      color: var(--muted);
      text-align: right;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .risk .fill.low {
      background: var(--green);
    }

    .risk .fill.medium {
      background: var(--amber);
    }

    .risk .fill.high {
      background: var(--red);
    }

    .chart-wrap {
      width: 100%;
      height: 235px;
      position: relative;
    }

    svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .axis {
      stroke: #b8c6d1;
      stroke-width: 1;
    }

    .gridline {
      stroke: #e4ebf0;
      stroke-width: 1;
    }

    .line {
      fill: none;
      stroke: var(--teal);
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .dot {
      fill: #ffffff;
      stroke: var(--teal);
      stroke-width: 2.5;
    }

    .area {
      fill: rgba(18, 140, 126, 0.12);
    }

    .tick {
      fill: var(--muted);
      font-size: 11px;
    }

    .tooltip {
      position: fixed;
      transform: translate(-50%, calc(-100% - 12px));
      pointer-events: none;
      background: #17212b;
      color: #fff;
      border-radius: 6px;
      padding: 7px 9px;
      font-size: 12px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.18);
      opacity: 0;
      transition: opacity 120ms ease;
      z-index: 10;
      white-space: nowrap;
    }

    .tooltip.visible {
      opacity: 1;
    }

    footer {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    @media (max-width: 920px) {
      .dashboard {
        width: min(100% - 24px, 760px);
      }

      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .kpis,
      .grid {
        grid-template-columns: 1fr 1fr;
      }

      .panel-wide {
        grid-column: span 2;
      }
    }

    @media (max-width: 640px) {
      .dashboard {
        width: min(100% - 20px, 520px);
        padding: 18px 0;
      }

      h1 {
        font-size: 22px;
      }

      .kpis,
      .grid {
        grid-template-columns: 1fr;
      }

      .panel-wide {
        grid-column: span 1;
      }

      .bar-row {
        grid-template-columns: 78px minmax(90px, 1fr) 78px;
        gap: 9px;
      }

      .hint {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main class="dashboard">
    <header>
      <div>
        <h1>해양 수산 KPI 대시보드</h1>
        <div class="meta">2024-01-03 ~ 2025-12-28 · 표본 300건</div>
      </div>
      <div class="badge">단위: USD, 톤, 건</div>
    </header>

    <section class="kpis" aria-label="핵심 지표">
      <article class="card kpi">
        <div class="kpi-label">총 어획량</div>
        <div><span class="kpi-value" id="totalCatch">-</span><span class="kpi-unit">톤</span></div>
        <div class="kpi-note">전체 기록 합계</div>
      </article>
      <article class="card kpi">
        <div class="kpi-label">총 수출액</div>
        <div><span class="kpi-value" id="totalExport">-</span></div>
        <div class="kpi-note">월별 수출액 합계</div>
      </article>
      <article class="card kpi">
        <div class="kpi-label">평균 만족도</div>
        <div><span class="kpi-value" id="avgSatisfaction">-</span><span class="kpi-unit">점</span></div>
        <div class="kpi-note">100점 기준 평균</div>
      </article>
      <article class="card kpi">
        <div class="kpi-label">총 안전사고 건수</div>
        <div><span class="kpi-value" id="totalIncidents">-</span><span class="kpi-unit">건</span></div>
        <div class="kpi-note">기상위험도별 비교 포함</div>
      </article>
    </section>

    <section class="grid">
      <article class="card panel">
        <div class="panel-head">
          <h2>항만별 위판금액 TOP 5</h2>
          <span class="hint">합계 기준</span>
        </div>
        <div class="bars" id="topPorts"></div>
      </article>

      <article class="card panel risk">
        <div class="panel-head">
          <h2>기상위험도별 사고 건수 비교</h2>
          <span class="hint">안전사고 합계</span>
        </div>
        <div class="bars" id="riskBars"></div>
      </article>

      <article class="card panel panel-wide">
        <div class="panel-head">
          <h2>월별 수출액 추이</h2>
          <span class="hint">1월 ~ 12월</span>
        </div>
        <div class="chart-wrap">
          <svg id="monthlyChart" viewBox="0 0 980 245" role="img" aria-label="월별 수출액 추이 선 그래프"></svg>
        </div>
      </article>
    </section>

    <footer>Source: ocean_fisheries_sample_300_cp949.csv</footer>
  </main>
  <div class="tooltip" id="tooltip"></div>

  <script>
    const dashboardData = {
      summary: {
        totalCatch: 912.36,
        totalExport: 1319524,
        avgSatisfaction: 75.55466666666668,
        totalIncidents: 141
      },
      topPorts: [
        { port: "앵커리지", landing: 501792 },
        { port: "홋카이도", landing: 390339 },
        { port: "시애틀", landing: 382311 },
        { port: "보스턴", landing: 380366 },
        { port: "샌디에이고", landing: 322047 }
      ],
      monthly: [
        { month: 1, export: 85862 },
        { month: 2, export: 91247 },
        { month: 3, export: 124994 },
        { month: 4, export: 110566 },
        { month: 5, export: 122051 },
        { month: 6, export: 126683 },
        { month: 7, export: 120555 },
        { month: 8, export: 131000 },
        { month: 9, export: 112020 },
        { month: 10, export: 110853 },
        { month: 11, export: 100442 },
        { month: 12, export: 83251 }
      ],
      risk: [
        { risk: "Low", label: "낮음", incidents: 38 },
        { risk: "Medium", label: "보통", incidents: 79 },
        { risk: "High", label: "높음", incidents: 24 }
      ]
    };

    const money = new Intl.NumberFormat("ko-KR", {
      style: "currency",
      currency: "USD",
      maximumFractionDigits: 0
    });
    const number = new Intl.NumberFormat("ko-KR", { maximumFractionDigits: 1 });

    const compactMoney = (value) => {
      if (value >= 1000000) return `$${(value / 1000000).toFixed(2)}M`;
      if (value >= 1000) return `$${Math.round(value / 1000)}K`;
      return money.format(value);
    };

    function setKpis() {
      const { summary } = dashboardData;
      document.querySelector("#totalCatch").textContent = number.format(summary.totalCatch);
      document.querySelector("#totalExport").textContent = compactMoney(summary.totalExport);
      document.querySelector("#avgSatisfaction").textContent = number.format(summary.avgSatisfaction);
      document.querySelector("#totalIncidents").textContent = number.format(summary.totalIncidents);
    }

    function renderBars(selector, rows, options) {
      const host = document.querySelector(selector);
      const max = Math.max(...rows.map(options.value));
      host.innerHTML = rows.map((row) => {
        const value = options.value(row);
        const pct = max ? (value / max) * 100 : 0;
        const tone = options.tone ? options.tone(row) : "";
        return `
          <div class="bar-row">
            <div class="bar-label" title="${options.label(row)}">${options.label(row)}</div>
            <div class="track" aria-hidden="true"><div class="fill ${tone}" style="width:${pct}%"></div></div>
            <div class="bar-value">${options.format(value)}</div>
          </div>
        `;
      }).join("");
    }

    function renderMonthlyChart() {
      const svg = document.querySelector("#monthlyChart");
      const rows = dashboardData.monthly;
      const width = 980;
      const height = 245;
      const pad = { top: 18, right: 24, bottom: 40, left: 74 };
      const chartW = width - pad.left - pad.right;
      const chartH = height - pad.top - pad.bottom;
      const min = Math.min(...rows.map((d) => d.export)) * 0.88;
      const max = Math.max(...rows.map((d) => d.export)) * 1.06;
      const x = (index) => pad.left + (index / (rows.length - 1)) * chartW;
      const y = (value) => pad.top + (1 - ((value - min) / (max - min))) * chartH;
      const points = rows.map((d, i) => [x(i), y(d.export)]);
      const line = points.map((p, i) => `${i ? "L" : "M"} ${p[0].toFixed(2)} ${p[1].toFixed(2)}`).join(" ");
      const area = `${line} L ${x(rows.length - 1)} ${pad.top + chartH} L ${pad.left} ${pad.top + chartH} Z`;
      const ticks = 4;
      let html = "";

      for (let i = 0; i <= ticks; i += 1) {
        const value = min + ((max - min) / ticks) * i;
        const yy = y(value);
        html += `<line class="gridline" x1="${pad.left}" y1="${yy}" x2="${width - pad.right}" y2="${yy}"></line>`;
        html += `<text class="tick" x="${pad.left - 10}" y="${yy + 4}" text-anchor="end">${compactMoney(value)}</text>`;
      }

      html += `<path class="area" d="${area}"></path>`;
      html += `<path class="line" d="${line}"></path>`;
      html += `<line class="axis" x1="${pad.left}" y1="${pad.top + chartH}" x2="${width - pad.right}" y2="${pad.top + chartH}"></line>`;

      rows.forEach((d, i) => {
        const xx = x(i);
        const yy = y(d.export);
        html += `<text class="tick" x="${xx}" y="${height - 14}" text-anchor="middle">${d.month}월</text>`;
        html += `<circle class="dot" cx="${xx}" cy="${yy}" r="5" data-label="${d.month}월" data-value="${money.format(d.export)}"></circle>`;
      });

      svg.innerHTML = html;
    }

    function attachTooltip() {
      const tooltip = document.querySelector("#tooltip");
      document.querySelectorAll(".dot").forEach((dot) => {
        dot.addEventListener("mouseenter", () => {
          tooltip.textContent = `${dot.dataset.label}: ${dot.dataset.value}`;
          tooltip.classList.add("visible");
        });
        dot.addEventListener("mousemove", (event) => {
          tooltip.style.left = `${event.clientX}px`;
          tooltip.style.top = `${event.clientY}px`;
        });
        dot.addEventListener("mouseleave", () => tooltip.classList.remove("visible"));
      });
    }

    setKpis();
    renderBars("#topPorts", dashboardData.topPorts, {
      label: (row) => row.port,
      value: (row) => row.landing,
      format: (value) => compactMoney(value)
    });
    renderBars("#riskBars", dashboardData.risk, {
      label: (row) => row.label,
      value: (row) => row.incidents,
      format: (value) => `${number.format(value)}건`,
      tone: (row) => row.risk.toLowerCase()
    });
    renderMonthlyChart();
    attachTooltip();
  </script>
</body>
</html>
