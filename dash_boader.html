<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>유형별 해양사고 현황 대시보드</title>
  <style>
    :root {
      --bg0:#061826;
      --bg1:#0a2a3e;
      --card:rgba(255,255,255,.095);
      --card2:rgba(255,255,255,.13);
      --text:#eff8ff;
      --muted:#9fc0d6;
      --line:rgba(180,220,255,.18);
      --accent:#47d7ff;
      --accent2:#5cf2bb;
      --warn:#ffd166;
      --danger:#ff6b6b;
      --shadow:0 24px 60px rgba(0,0,0,.28);
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      font-family:"Segoe UI","Malgun Gothic",Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 15% 5%, rgba(71,215,255,.26), transparent 32%),
        radial-gradient(circle at 90% 8%, rgba(92,242,187,.18), transparent 35%),
        linear-gradient(135deg,var(--bg0),var(--bg1) 56%,#07111f);
      min-height:100vh;
    }
    body::before {
      content:"";
      position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px);
      background-size:44px 44px;
      mask-image:linear-gradient(to bottom, rgba(0,0,0,.8), transparent 85%);
      pointer-events:none;
    }
    .wrap { width:min(1240px, calc(100% - 32px)); margin:0 auto; padding:34px 0 42px; position:relative; }
    header {
      display:grid; grid-template-columns:1fr auto; gap:20px; align-items:end;
      padding:26px; border:1px solid var(--line); border-radius:28px;
      background:linear-gradient(135deg, rgba(255,255,255,.14), rgba(255,255,255,.055));
      box-shadow:var(--shadow); backdrop-filter: blur(16px);
      margin-bottom:18px; overflow:hidden; position:relative;
    }
    header::after {
      content:"MARINE SAFETY DATA";
      position:absolute; right:22px; top:10px; font-size:12px; color:rgba(255,255,255,.22);
      letter-spacing:.24em; font-weight:800;
    }
    h1 { margin:0 0 10px; font-size:clamp(28px,4vw,48px); line-height:1.08; letter-spacing:-.04em; }
    .subtitle { color:var(--muted); font-size:15px; line-height:1.6; }
    .badge {
      border:1px solid rgba(71,215,255,.38); border-radius:999px; padding:10px 14px;
      color:#dff9ff; background:rgba(71,215,255,.10); white-space:nowrap; font-weight:700;
      box-shadow:0 0 24px rgba(71,215,255,.15) inset;
    }
    .cards { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:14px; }
    .card, .panel {
      border:1px solid var(--line); border-radius:24px;
      background:linear-gradient(180deg, var(--card2), var(--card));
      box-shadow:var(--shadow); backdrop-filter: blur(16px);
    }
    .card { padding:20px; min-height:132px; position:relative; overflow:hidden; }
    .card::after { content:""; position:absolute; width:90px; height:90px; border-radius:50%; right:-30px; bottom:-30px; background:rgba(71,215,255,.12); }
    .label { color:var(--muted); font-size:13px; font-weight:800; letter-spacing:.02em; }
    .value { font-size:clamp(28px,3vw,42px); font-weight:900; margin-top:12px; letter-spacing:-.04em; }
    .note { color:var(--muted); margin-top:8px; font-size:12px; }
    .filters {
      display:grid; grid-template-columns:1fr 1fr 1.4fr auto; gap:12px; align-items:end;
      padding:18px; margin-bottom:14px;
    }
    .field label { display:block; color:var(--muted); font-size:12px; font-weight:800; margin-bottom:7px; }
    select, input {
      width:100%; border:1px solid var(--line); border-radius:14px; padding:11px 12px;
      background:rgba(1,11,21,.55); color:var(--text); outline:none;
    }
    button {
      border:0; border-radius:14px; padding:12px 16px; font-weight:900; color:#04141e;
      background:linear-gradient(135deg,var(--accent),var(--accent2)); cursor:pointer;
    }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .panel { padding:20px; min-height:360px; overflow:hidden; }
    .wide { grid-column:1 / -1; }
    h2 { margin:0 0 14px; font-size:20px; letter-spacing:-.02em; }
    .chart { width:100%; height:280px; }
    svg { width:100%; height:100%; display:block; overflow:visible; }
    .axis, .gridline { stroke:rgba(210,235,255,.22); }
    .tick { fill:var(--muted); font-size:11px; }
    .line { fill:none; stroke:var(--accent); stroke-width:4; stroke-linecap:round; stroke-linejoin:round; filter:drop-shadow(0 0 7px rgba(71,215,255,.6)); }
    .area { fill:rgba(71,215,255,.13); }
    .bar { fill:url(#barGrad); }
    .bar2 { fill:url(#barGrad2); }
    .table-wrap { max-height:420px; overflow:auto; border-radius:18px; border:1px solid var(--line); }
    table { border-collapse:collapse; width:100%; min-width:980px; background:rgba(0,0,0,.14); }
    th, td { padding:10px 11px; border-bottom:1px solid rgba(255,255,255,.09); text-align:right; font-size:13px; }
    th { position:sticky; top:0; background:#0b2a3c; color:#c8edff; z-index:1; }
    td:first-child, th:first-child { text-align:center; font-weight:800; }
    tfoot td { position:sticky; bottom:0; background:#092437; color:#fff; font-weight:900; }
    .highlight {
      display:flex; gap:12px; align-items:center; padding:16px; border-radius:20px;
      background:rgba(255,209,102,.11); border:1px solid rgba(255,209,102,.25); margin-top:14px;
      color:#fff5d6;
    }
    .pulse { width:13px; height:13px; border-radius:50%; background:var(--warn); box-shadow:0 0 0 8px rgba(255,209,102,.12); flex:0 0 auto; }
    footer { color:var(--muted); font-size:12px; text-align:right; margin-top:18px; }
    @media (max-width:920px) {
      header, .filters, .grid { grid-template-columns:1fr; }
      .cards { grid-template-columns:1fr 1fr; }
    }
    @media (max-width:580px) {
      .wrap { width:min(100% - 20px, 520px); padding-top:18px; }
      .cards { grid-template-columns:1fr; }
      header { padding:20px; }
    }
  </style>
</head>

    <header>
      <div>

    <section class="grid">
      <article class="panel">

        <div class="chart"><svg id="lineChart" viewBox="0 0 620 280"></svg></div>
      </article>
      <article class="panel">

        <div class="chart"><svg id="barChart" viewBox="0 0 620 280"></svg></div>
      </article>
      <article class="panel">
        <h2>최근 5년 총 사고 추이</h2>
        <div class="chart"><svg id="recentChart" viewBox="0 0 620 280"></svg></div>
      </article>
      <article class="panel">
        <h2>최다 발생 유형 강조</h2>
        <div id="highlightBox" class="highlight"><span class="pulse"></span><div>분석 중...</div></div>
        <div class="chart" style="height:220px;margin-top:16px;"><svg id="selectedTypeChart" viewBox="0 0 620 220"></svg></div>
      </article>
      <article class="panel wide">
        <h2>연도별 데이터 표</h2>
        <div class="table-wrap" id="tableWrap"></div>
      </article>
    </section>

  </main>

function pathLine(data, key, w, h, pad) {
  const vals = data.map(r => Number(r[key] || 0));
  const min = Math.min(...vals) * 0.88;
  const max = Math.max(...vals) * 1.08 || 1;
  const x = i => pad.l + (data.length === 1 ? 0 : i/(data.length-1))*(w-pad.l-pad.r);

  return { points: data.map((r,i) => [x(i), y(Number(r[key]||0)), r]), min, max, x, y };
}

  for (let i=0;i<=4;i++) {
    const yy = pad.t + i*(h-pad.t-pad.b)/4;
    const val = p.max - i*(p.max-p.min)/4;
    html += `<line class="gridline" x1="${pad.l}" y1="${yy}" x2="${w-pad.r}" y2="${yy}"></line><text class="tick" x="${pad.l-8}" y="${yy+4}" text-anchor="end">${fmt(val)}</text>`;
  }
  html += `<path d="${area}" fill="url(#areaGrad)"></path><path class="line" d="${d}"></path><line class="axis" x1="${pad.l}" y1="${base}" x2="${w-pad.r}" y2="${base}"></line>`;
  p.points.forEach((pt,i) => {
    if (i === 0 || i === p.points.length-1 || i % Math.ceil(p.points.length/6) === 0) html += `<text class="tick" x="${pt[0]}" y="${h-16}" text-anchor="middle">${pt[2]["시점"]}</text>`;
    html += `<circle cx="${pt[0]}" cy="${pt[1]}" r="4.5" fill="#061826" stroke="#47d7ff" stroke-width="2"><title>${pt[2]["시점"]}년: ${fmt(pt[2][key])}건</title></circle>`;
  });
  svg.innerHTML = html;
}

function renderBar(svgId, items, topN=10) {
  const svg = document.getElementById(svgId), w=620, h=280, pad={l:90,r:28,t:18,b:28};
  const data = items.slice(0, topN);
  const max = Math.max(...data.map(d => d.value), 1);
  let html = `<defs><linearGradient id="barGrad" x1="0" x2="1"><stop offset="0%" stop-color="#47d7ff"/><stop offset="100%" stop-color="#5cf2bb"/></linearGradient><linearGradient id="barGrad2" x1="0" x2="1"><stop offset="0%" stop-color="#ffd166"/><stop offset="100%" stop-color="#ff8f70"/></linearGradient></defs>`;
  const rowH = (h-pad.t-pad.b)/data.length;
  data.forEach((d,i) => {
    const y = pad.t + i*rowH + 4;
    const bw = (w-pad.l-pad.r) * d.value / max;
    html += `<text class="tick" x="${pad.l-10}" y="${y+rowH*.56}" text-anchor="end">${d.type}</text>`;
    html += `<rect class="${i===0?'bar2':'bar'}" x="${pad.l}" y="${y}" width="${bw}" height="${Math.max(12,rowH-8)}" rx="8"><title>${d.type}: ${fmt(d.value)}건</title></rect>`;
    html += `<text class="tick" x="${pad.l+bw+8}" y="${y+rowH*.56}">${fmt(d.value)}</text>`;
  });
  svg.innerHTML = html;
}

function renderTable(data) {
  const cols = ["시점","총계"].concat(typeCols);
  const totalRow = {};
  cols.forEach(c => totalRow[c] = c === "시점" ? "합계" : sum(data,c));
  const thead = `<thead><tr>${cols.map(c => `<th>${c}</th>`).join("")}</tr></thead>`;
  const body = `<tbody>${data.map(r => `<tr>${cols.map(c => `<td>${c==="시점" ? r[c] : fmt(r[c])}</td>`).join("")}</tr>`).join("")}</tbody>`;
  const foot = `<tfoot><tr>${cols.map(c => `<td>${c==="시점" ? "합계" : fmt(totalRow[c])}</td>`).join("")}</tr></tfoot>`;
  document.getElementById("tableWrap").innerHTML = `<table>${thead}${body}${foot}</table>`;
}

function update() {
  const data = filteredRows();
  const selected = document.getElementById("typeSelect").value;
  const total = sum(data, "총계");
  const avg = total / Math.max(data.length,1);
  const totals = typeCols.map(c => ({ type:c, value:sum(data,c) })).sort((a,b)=>b.value-a.value);
  const top = totals[0];
  const maxRow = data.reduce((a,r) => Number(r["총계"]) > Number(a["총계"]) ? r : a, data[0]);

  document.getElementById("kpiTotal").textContent = fmt(total) + "건";
  document.getElementById("kpiTopType").textContent = top.type;
  document.getElementById("kpiTopTypeNote").textContent = fmt(top.value) + "건";
  document.getElementById("kpiAvg").textContent = fmt(avg) + "건";
  document.getElementById("kpiMaxYear").textContent = maxRow["시점"] + "년";
  document.getElementById("kpiMaxYearNote").textContent = fmt(maxRow["총계"]) + "건";

  renderLine("lineChart", data, "총계");
  renderBar("barChart", totals, 10);
  renderLine("recentChart", data.slice(-5), "총계");
  renderLine("selectedTypeChart", data, selected);
  document.getElementById("highlightBox").innerHTML = `<span class="pulse"></span><div><strong>${top.type}</strong>이(가) 선택 기간 최다 발생 유형입니다. 합계는 <strong>${fmt(top.value)}건</strong>입니다.</div>`;
  renderTable(data);
}

initFilters();
document.getElementById("startYear").addEventListener("change", update);
document.getElementById("endYear").addEventListener("change", update);
document.getElementById("typeSelect").addEventListener("change", update);
document.getElementById("resetBtn").addEventListener("click", () => {
  document.getElementById("startYear").value = years[0];
  document.getElementById("endYear").value = years[years.length-1];
  document.getElementById("typeSelect").value = "총계";
  update();
});
update();
</script>
</body>
</html>
