<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자전거 타는 아이와 강아지들</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(#8ed8ff 0%, #bdefff 48%, #8bd17c 48%, #48a84f 100%);
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .sun {
      position: absolute;
      top: 55px;
      right: 90px;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #ffd84d;
      box-shadow: 0 0 50px rgba(255, 216, 77, 0.75);
      animation: sunGlow 3s ease-in-out infinite alternate;
    }

    @keyframes sunGlow {
      from { transform: scale(1); }
      to { transform: scale(1.08); }
    }

    .cloud {
      position: absolute;
      width: 150px;
      height: 52px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      animation: cloudMove 28s linear infinite;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
    }

    .cloud::before {
      width: 70px;
      height: 70px;
      left: 20px;
      top: -34px;
    }

    .cloud::after {
      width: 86px;
      height: 86px;
      right: 18px;
      top: -46px;
    }

    .cloud.one {
      top: 105px;
      left: -180px;
    }

    .cloud.two {
      top: 170px;
      left: -260px;
      transform: scale(0.72);
      animation-delay: 9s;
      opacity: 0.78;
    }

    @keyframes cloudMove {
      from { translate: 0 0; }
      to { translate: calc(100vw + 360px) 0; }
    }

    .mountain {
      position: absolute;
      bottom: 45%;
      width: 420px;
      height: 220px;
      background: #5fb36b;
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
      opacity: 0.7;
    }

    .mountain.left {
      left: 40px;
    }

    .mountain.right {
      right: 30px;
      transform: scale(1.2);
      opacity: 0.55;
    }

    .grass {
      position: absolute;
      bottom: 220px;
      width: 100%;
      height: 80px;
      background: linear-gradient(#6fd36f, #51b75b);
    }

    .road {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 220px;
      background: #4b5563;
      border-top: 12px solid #374151;
    }

    .road::before {
      content: "";
      position: absolute;
      top: 96px;
      left: 0;
      width: 100%;
      height: 8px;
      background: repeating-linear-gradient(
        90deg,
        #facc15 0 70px,
        transparent 70px 120px
      );
      animation: roadLineMove 0.7s linear infinite;
    }

    @keyframes roadLineMove {
      from { background-position: 0 0; }
      to { background-position: -120px 0; }
    }

    .tree {
      position: absolute;
      bottom: 245px;
      width: 36px;
      height: 110px;
      background: #8b5a2b;
      border-radius: 16px;
      animation: backgroundMove 8s linear infinite;
    }

    .tree::before {
      content: "";
      position: absolute;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: #249c4a;
      left: 50%;
      top: -78px;
      transform: translateX(-50%);
      box-shadow:
        -34px 20px 0 #2fb85b,
        34px 18px 0 #1f8d42;
    }

    .tree.t1 {
      left: 95%;
    }

    .tree.t2 {
      left: 130%;
      transform: scale(0.82);
      animation-delay: 2s;
    }

    .tree.t3 {
      left: 165%;
      transform: scale(1.15);
      animation-delay: 4.5s;
    }

    @keyframes backgroundMove {
      from { translate: 0 0; }
      to { translate: -140vw 0; }
    }

    .caption {
      position: absolute;
      left: 50%;
      top: 8%;
      transform: translateX(-50%);
      padding: 16px 24px;
      border-radius: 999px;
      color: #064e3b;
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(10px);
      font-size: clamp(18px, 3vw, 30px);
      font-weight: 900;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
      white-space: nowrap;
      z-index: 10;
    }

    .moving-group {
      position: absolute;
      left: 50%;
      bottom: 145px;
      width: 760px;
      height: 270px;
      transform: translateX(-50%);
      animation: groupBounce 0.7s ease-in-out infinite alternate;
      z-index: 5;
    }

    @keyframes groupBounce {
      from { translate: 0 0; }
      to { translate: 0 -5px; }
    }

    /* 자전거 */
    .bike {
      position: absolute;
      left: 340px;
      bottom: 0;
      width: 250px;
      height: 150px;
      z-index: 4;
    }

    .wheel {
      position: absolute;
      bottom: 0;
      width: 74px;
      height: 74px;
      border: 7px solid #111827;
      border-radius: 50%;
      background: transparent;
      animation: wheelSpin 0.55s linear infinite;
    }

    .wheel::before,
    .wheel::after {
      content: "";
      position: absolute;
      background: #111827;
      left: 50%;
      top: 50%;
      transform-origin: center;
    }

    .wheel::before {
      width: 4px;
      height: 62px;
      transform: translate(-50%, -50%);
    }

    .wheel::after {
      width: 62px;
      height: 4px;
      transform: translate(-50%, -50%);
    }

    .wheel.back {
      left: 18px;
    }

    .wheel.front {
      right: 16px;
    }

    @keyframes wheelSpin {
      from { rotate: 0deg; }
      to { rotate: 360deg; }
    }

    .bike-frame {
      position: absolute;
      left: 55px;
      bottom: 34px;
      width: 135px;
      height: 70px;
    }

    .bar {
      position: absolute;
      height: 7px;
      background: #ef4444;
      border-radius: 999px;
      transform-origin: left center;
    }

    .bar.one {
      width: 82px;
      left: 0;
      top: 45px;
      rotate: -34deg;
    }

    .bar.two {
      width: 82px;
      left: 70px;
      top: 45px;
      rotate: -145deg;
    }

    .bar.three {
      width: 95px;
      left: 17px;
      top: 10px;
      rotate: 35deg;
    }

    .bar.four {
      width: 75px;
      left: 70px;
      top: 45px;
      rotate: -52deg;
    }

    .seat {
      position: absolute;
      left: 76px;
      bottom: 102px;
      width: 50px;
      height: 13px;
      border-radius: 999px;
      background: #111827;
    }

    .handle {
      position: absolute;
      right: 18px;
      bottom: 103px;
      width: 45px;
      height: 30px;
      border-top: 7px solid #111827;
      border-right: 7px solid #111827;
      border-radius: 0 20px 0 0;
      transform: rotate(12deg);
    }

    .pedal {
      position: absolute;
      left: 118px;
      bottom: 48px;
      width: 34px;
      height: 34px;
      border: 5px solid #111827;
      border-radius: 50%;
      animation: wheelSpin 0.55s linear infinite;
    }

    .pedal::before {
      content: "";
      position: absolute;
      width: 40px;
      height: 5px;
      background: #111827;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 999px;
    }

    /* 아이 */
    .kid {
      position: absolute;
      left: 425px;
      bottom: 78px;
      width: 90px;
      height: 150px;
      z-index: 6;
    }

    .head {
      position: absolute;
      top: 0;
      left: 28px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #f3b37a;
      box-shadow: inset -8px -5px 0 rgba(0, 0, 0, 0.08);
    }

    .hair {
      position: absolute;
      top: -4px;
      left: 25px;
      width: 54px;
      height: 28px;
      border-radius: 999px 999px 10px 10px;
      background: #3f2a1d;
    }

    .eye {
      position: absolute;
      top: 20px;
      left: 64px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #111827;
    }

    .smile {
      position: absolute;
      top: 30px;
      left: 59px;
      width: 14px;
      height: 8px;
      border-bottom: 3px solid #7f1d1d;
      border-radius: 0 0 14px 14px;
    }

    .body {
      position: absolute;
      top: 48px;
      left: 24px;
      width: 54px;
      height: 62px;
      border-radius: 18px;
      background: #2563eb;
      transform: rotate(8deg);
    }

    .arm {
      position: absolute;
      top: 58px;
      width: 54px;
      height: 10px;
      background: #f3b37a;
      border-radius: 999px;
      transform-origin: left center;
    }

    .arm.front {
      left: 61px;
      rotate: 26deg;
    }

    .arm.back {
      left: 28px;
      rotate: 130deg;
      z-index: -1;
    }

    .leg {
      position: absolute;
      top: 103px;
      width: 58px;
      height: 11px;
      background: #1e3a8a;
      border-radius: 999px;
      transform-origin: left center;
      animation: legMove 0.55s linear infinite;
    }

    .leg.front {
      left: 48px;
      rotate: 30deg;
    }

    .leg.back {
      left: 36px;
      rotate: 140deg;
      animation-delay: 0.28s;
    }

    @keyframes legMove {
      0% { transform: rotate(0deg); }
      50% { transform: rotate(24deg); }
      100% { transform: rotate(0deg); }
    }

    /* 강아지 - 더 크게, 더 선명하게 수정 */
    .dog {
      position: absolute;
      width: 165px;
      height: 110px;
      bottom: 6px;
      z-index: 7;
      animation: dogHop 0.42s ease-in-out infinite alternate;
      filter: drop-shadow(0 10px 8px rgba(0, 0, 0, 0.25));
    }

    .dog.one {
      left: 155px;
    }

    .dog.two {
      left: -15px;
      bottom: 0;
      transform: scale(0.92);
      animation-delay: 0.2s;
      z-index: 6;
    }

    @keyframes dogHop {
      from { translate: 0 0; }
      to { translate: 0 -10px; }
    }

    .dog-body {
      position: absolute;
      left: 42px;
      top: 42px;
      width: 88px;
      height: 46px;
      border-radius: 28px 34px 22px 22px;
      background: #ffffff;
      border: 4px solid #7c2d12;
    }

    .dog.one .dog-body {
      background: #fff7ed;
    }

    .dog.two .dog-body {
      background: #fde68a;
    }

    .dog-head {
      position: absolute;
      left: 118px;
      top: 27px;
      width: 48px;
      height: 46px;
      border-radius: 50%;
      background: #fff7ed;
      border: 4px solid #7c2d12;
    }

    .dog.two .dog-head {
      background: #fde68a;
    }

    .dog-ear {
      position: absolute;
      left: 116px;
      top: 28px;
      width: 22px;
      height: 34px;
      border-radius: 999px;
      background: #92400e;
      transform: rotate(24deg);
      transform-origin: top center;
      animation: earFlap 0.4s ease-in-out infinite alternate;
    }

    @keyframes earFlap {
      from { rotate: 0deg; }
      to { rotate: 14deg; }
    }

    .dog-eye {
      position: absolute;
      left: 150px;
      top: 44px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #111827;
      z-index: 2;
    }

    .dog-nose {
      position: absolute;
      left: 161px;
      top: 54px;
      width: 10px;
      height: 8px;
      border-radius: 50%;
      background: #111827;
      z-index: 2;
    }

    .dog-mouth {
      position: absolute;
      left: 151px;
      top: 61px;
      width: 14px;
      height: 9px;
      border-bottom: 3px solid #7f1d1d;
      border-radius: 0 0 999px 999px;
      z-index: 2;
    }

    .dog-tail {
      position: absolute;
      left: 17px;
      top: 48px;
      width: 38px;
      height: 11px;
      border-radius: 999px;
      background: #92400e;
      transform-origin: right center;
      animation: tailWag 0.25s ease-in-out infinite alternate;
    }

    @keyframes tailWag {
      from { transform: rotate(-30deg); }
      to { transform: rotate(30deg); }
    }

    .dog-leg {
      position: absolute;
      top: 83px;
      width: 13px;
      height: 31px;
      border-radius: 999px;
      background: #7c2d12;
      transform-origin: top center;
      animation: dogRun 0.35s linear infinite;
    }

    .dog-leg.l1 {
      left: 55px;
    }

    .dog-leg.l2 {
      left: 82px;
      animation-delay: 0.18s;
    }

    .dog-leg.l3 {
      left: 109px;
      animation-delay: 0.1s;
    }

    @keyframes dogRun {
      0% { transform: rotate(20deg); }
      50% { transform: rotate(-20deg); }
      100% { transform: rotate(20deg); }
    }

    .dog-spot {
      position: absolute;
      left: 72px;
      top: 50px;
      width: 28px;
      height: 22px;
      border-radius: 50%;
      background: #92400e;
      z-index: 1;
    }

    .dog.two .dog-spot {
      background: #b45309;
    }

    @media (max-width: 760px) {
      .moving-group {
        transform: translateX(-50%) scale(0.72);
      }

      .caption {
        top: 4%;
        font-size: 18px;
      }

      .sun {
        right: 30px;
        width: 70px;
        height: 70px;
      }
    }
  </style>
</head>

<body>
  <main class="scene">
    <div class="sun"></div>

    <div class="cloud one"></div>
    <div class="cloud two"></div>

    <div class="mountain left"></div>
    <div class="mountain right"></div>

    <div class="grass"></div>

    <div class="tree t1"></div>
    <div class="tree t2"></div>
    <div class="tree t3"></div>

    <h1 class="caption">자전거를 타는 아이와 뒤따르는 강아지 2마리</h1>

    <section class="moving-group">
      <div class="dog two">
        <div class="dog-tail"></div>
        <div class="dog-body"></div>
        <div class="dog-spot"></div>
        <div class="dog-head"></div>
        <div class="dog-ear"></div>
        <div class="dog-eye"></div>
        <div class="dog-nose"></div>
        <div class="dog-mouth"></div>
        <div class="dog-leg l1"></div>
        <div class="dog-leg l2"></div>
        <div class="dog-leg l3"></div>
      </div>

      <div class="dog one">
        <div class="dog-tail"></div>
        <div class="dog-body"></div>
        <div class="dog-spot"></div>
        <div class="dog-head"></div>
        <div class="dog-ear"></div>
        <div class="dog-eye"></div>
        <div class="dog-nose"></div>
        <div class="dog-mouth"></div>
        <div class="dog-leg l1"></div>
        <div class="dog-leg l2"></div>
        <div class="dog-leg l3"></div>
      </div>

      <div class="bike">
        <div class="wheel back"></div>
        <div class="wheel front"></div>

        <div class="bike-frame">
          <div class="bar one"></div>
          <div class="bar two"></div>
          <div class="bar three"></div>
          <div class="bar four"></div>
        </div>

        <div class="seat"></div>
        <div class="handle"></div>
        <div class="pedal"></div>
      </div>

      <div class="kid">
        <div class="hair"></div>
        <div class="head"></div>
        <div class="eye"></div>
        <div class="smile"></div>
        <div class="body"></div>
        <div class="arm back"></div>
        <div class="arm front"></div>
        <div class="leg back"></div>
        <div class="leg front"></div>
      </div>
    </section>

    <div class="road"></div>
  </main>
</body>
</html>
